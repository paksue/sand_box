name: Update food guide

on:
  push:
    branches: [main]
    paths:
      - scripts/update_food_guide.py
      - .github/workflows/update-food-guide.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update guide data and mobile layout
        run: python scripts/update_food_guide.py
      - name: Commit generated guide
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add food_guide/index.html
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Expand food guide categories and items"
            git push
          fi
